<!-- wap take input and print fibonacci serias up to n number using javascript -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter the number  Fibonacci number :"));
        let a = 0, b = 1, nextTerm;
        document.writeln("Fibonacci Series up to " + n + " number <br>");
        for (let i = 1; i <= n; i++) {
            document.writeln(a + "<br>");
            nextTerm = a + b;
            a = b;
            b = nextTerm;
        }
    </script>
</body>
</html>
