<!-- wap to display string lentgh ,upper ,and lowercase versions of an input string using javascript -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        let a = prompt("enter a string ");
        let len =a.length ;
        let upper = a.toUpperCase();
        let lower = a.toLowerCase();
        document.writeln("Length of the string: " + len + "<br>");
        document.writeln("Uppercase: " + upper + "<br>");
        document.writeln("Lowercase: " + lower + "<br>");
    </script>
 </body>
 </html>
